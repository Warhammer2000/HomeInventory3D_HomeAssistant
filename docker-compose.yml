services:
  backend:
    build:
      context: ./Backend_part
      dockerfile: src/HomeInventory3D.Api/Dockerfile
    ports:
      - "5300:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=host.docker.internal;Port=5433;Database=home_inventory_3d;Username=postgres;Password=postgres
      - Storage__BasePath=/app/storage
      - Storage__BaseUrl=http://localhost:5300
      - Claude__ApiKey=${CLAUDE_API_KEY:-}
      - Meshy__ApiKey=${MESHY_API_KEY:-}
      - Cors__Origins__0=http://localhost:4250
      - Cors__Origins__1=http://frontend
    volumes:
      - storage:/app/storage

  frontend:
    build:
      context: ./Frontend_part
      dockerfile: Dockerfile
    ports:
      - "4250:80"
    depends_on:
      - backend

volumes:
  storage:
