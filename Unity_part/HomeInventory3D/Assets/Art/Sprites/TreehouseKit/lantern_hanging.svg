<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 96" width="52" height="96">
  <!-- Chain links -->
  <ellipse cx="26" cy="6"  rx="5" ry="4" fill="none" stroke="#8a7830" stroke-width="2.5"/>
  <ellipse cx="26" cy="14" rx="5" ry="4" fill="none" stroke="#8a7830" stroke-width="2.5"/>
  <ellipse cx="26" cy="22" rx="5" ry="4" fill="none" stroke="#8a7830" stroke-width="2.5"/>

  <!-- Top cap -->
  <rect x="16" y="27" width="20" height="8" rx="3" fill="#9a7020" stroke="#1a1209" stroke-width="2.5"/>

  <!-- Lantern body glow -->
  <rect x="10" y="35" width="32" height="40" rx="6" fill="#ffd070" stroke="none"/>

  <!-- Lantern body frame -->
  <rect x="10" y="35" width="32" height="40" rx="6" fill="#f0a030" stroke="#1a1209" stroke-width="2.5"/>

  <!-- Frame stripes top and bottom -->
  <rect x="10" y="35" width="32" height="10" rx="4" fill="#c4923a" stroke="#1a1209" stroke-width="2"/>
  <rect x="10" y="65" width="32" height="10" rx="4" fill="#c4923a" stroke="#1a1209" stroke-width="2"/>

  <!-- Vertical frame bars -->
  <line x1="22" y1="35" x2="22" y2="75" stroke="#c4923a" stroke-width="2.5"/>
  <line x1="30" y1="35" x2="30" y2="75" stroke="#c4923a" stroke-width="2.5"/>

  <!-- Inner glow -->
  <ellipse cx="26" cy="55" rx="10" ry="12" fill="#ffe8a0" fill-opacity="0.7"/>

  <!-- Bottom cap -->
  <rect x="16" y="75" width="20" height="8" rx="3" fill="#9a7020" stroke="#1a1209" stroke-width="2.5"/>

  <!-- Small hanging ornament -->
  <line x1="26" y1="83" x2="26" y2="90" stroke="#8a7830" stroke-width="2"/>
  <circle cx="26" cy="93" r="3" fill="#c4923a" stroke="#1a1209" stroke-width="1.5"/>
</svg>
