<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 118" width="96" height="118">
  <!-- Shadow -->
  <ellipse cx="48" cy="114" rx="36" ry="7" fill="#00000033"/>

  <!-- Well base cylinder - back face -->
  <ellipse cx="48" cy="70" rx="34" ry="10" fill="#8a8878" stroke="#1a1209" stroke-width="2.5"/>

  <!-- Well cylinder walls -->
  <path d="M14,70 L14,96 Q14,108 48,108 Q82,108 82,96 L82,70 Q82,80 48,80 Q14,80 14,70 Z"
        fill="#9a9888" stroke="#1a1209" stroke-width="3"/>

  <!-- Stone ring lines on cylinder -->
  <path d="M15,78 Q48,88 81,78" fill="none" stroke="#7a7868" stroke-width="1.5"/>
  <path d="M15,88 Q48,98 81,88" fill="none" stroke="#7a7868" stroke-width="1.5"/>
  <path d="M16,98 Q48,108 80,98" fill="none" stroke="#7a7868" stroke-width="1.5"/>

  <!-- Vertical stone seams on cylinder -->
  <line x1="26" y1="72" x2="24" y2="104" stroke="#7a7868" stroke-width="1.5"/>
  <line x1="48" y1="80" x2="48" y2="108" stroke="#7a7868" stroke-width="1.5"/>
  <line x1="70" y1="72" x2="72" y2="104" stroke="#7a7868" stroke-width="1.5"/>

  <!-- Well base cylinder - top ellipse (rim) -->
  <ellipse cx="48" cy="70" rx="34" ry="10" fill="#b0aea0" stroke="#1a1209" stroke-width="3"/>

  <!-- Wooden crossbeam posts -->
  <rect x="18" y="24" width="10" height="50" rx="4" fill="#c4923a" stroke="#1a1209" stroke-width="2.5"/>
  <rect x="68" y="24" width="10" height="50" rx="4" fill="#c4923a" stroke="#1a1209" stroke-width="2.5"/>

  <!-- Crossbeam horizontal bar -->
  <rect x="12" y="20" width="72" height="12" rx="5" fill="#c4923a" stroke="#1a1209" stroke-width="2.5"/>
  <!-- Grain lines on beam -->
  <line x1="14" y1="26" x2="82" y2="26" stroke="#a07820" stroke-width="1.5"/>

  <!-- Roof apex -->
  <polygon points="48,4 8,22 88,22" fill="#8B6914" stroke="#1a1209" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Rope spool / winch in center -->
  <rect x="40" y="18" width="16" height="10" rx="3" fill="#7a5810" stroke="#1a1209" stroke-width="2"/>

  <!-- Rope hanging down -->
  <line x1="48" y1="28" x2="48" y2="56" stroke="#c8a040" stroke-width="2.5" stroke-dasharray="4,3"/>

  <!-- Bucket -->
  <path d="M38,56 Q38,72 48,72 Q58,72 58,56 Z" fill="#9a9888" stroke="#1a1209" stroke-width="2.5"/>
  <ellipse cx="48" cy="56" rx="10" ry="4" fill="#b0aea0" stroke="#1a1209" stroke-width="2"/>
  <!-- Bucket handle -->
  <path d="M38,56 Q38,46 48,46 Q58,46 58,56" fill="none" stroke="#7a5810" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Ivy / moss on stone -->
  <circle cx="22" cy="92" r="6" fill="#4d8c3a" stroke="#1a1209" stroke-width="1.5"/>
  <circle cx="30" cy="98" r="5" fill="#4d8c3a" stroke="#1a1209" stroke-width="1.5"/>
  <circle cx="70" cy="96" r="5" fill="#4d8c3a" stroke="#1a1209" stroke-width="1.5"/>
</svg>
