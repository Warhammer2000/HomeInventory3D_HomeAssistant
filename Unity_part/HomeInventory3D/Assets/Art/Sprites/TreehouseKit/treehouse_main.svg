  <path d="M103,298 Q95,272 108,248 L172,248 Q185,272 177,298 Q150,308 103,298 Z"
        fill="#9a6e18" stroke="#1a1209" stroke-width="3"/>

  <!-- Trunk knot left -->
  <path d="M112,288 Q124,278 136,288 Q124,298 112,288 Z"
        fill="#6a4e0e" stroke="#1a1209" stroke-width="2"/>
  <!-- Trunk knot right -->
  <path d="M152,308 Q164,298 176,308 Q164,318 152,308 Z"
        fill="#6a4e0e" stroke="#1a1209" stroke-width="2"/>

  <!-- Platform deck boards -->
  <rect x="68" y="242" width="144" height="14" rx="2" fill="#c4923a" stroke="#1a1209" stroke-width="3"/>
  <line x1="95"  y1="242" x2="95"  y2="256" stroke="#9a6e18" stroke-width="1.5"/>
  <line x1="122" y1="242" x2="122" y2="256" stroke="#9a6e18" stroke-width="1.5"/>
  <line x1="149" y1="242" x2="149" y2="256" stroke="#9a6e18" stroke-width="1.5"/>
  <line x1="176" y1="242" x2="176" y2="256" stroke="#9a6e18" stroke-width="1.5"/>
  <!-- Railing posts -->
  <line x1="72"  y1="232" x2="72"  y2="248" stroke="#1a1209" stroke-width="3" stroke-linecap="round"/>
  <line x1="208" y1="232" x2="208" y2="248" stroke="#1a1209" stroke-width="3" stroke-linecap="round"/>
  <line x1="72"  y1="234" x2="208" y2="234" stroke="#1a1209" stroke-width="2.5"/>

  <!-- Canopy main blob -->
  <ellipse cx="140" cy="138" rx="128" ry="118" fill="#4d8c3a" stroke="#1a1209" stroke-width="4"/>
