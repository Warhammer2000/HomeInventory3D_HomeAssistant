<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 360" width="280" height="360">
  <!-- Shadow -->
  <ellipse cx="140" cy="352" rx="80" ry="12" fill="#00000033"/>

  <!-- Trunk -->
  <path d="M90,358 Q72,330 88,298 L100,248 L180,248 L192,298 Q208,330 190,358 Z"
