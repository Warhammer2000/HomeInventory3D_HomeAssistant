  <path d="M84,222 Q78,252 90,268 Q104,258 100,228 Z"
        fill="#4d8c3a" stroke="#1a1209" stroke-width="3" stroke-linejoin="round"/>
  <path d="M148,228 Q144,256 154,272 Q168,262 164,234 Z"
        fill="#4d8c3a" stroke="#1a1209" stroke-width="3" stroke-linejoin="round"/>
  <path d="M204,210 Q216,238 210,260 Q226,250 228,222 Z"
        fill="#4d8c3a" stroke="#1a1209" stroke-width="3" stroke-linejoin="round"/>

  <!-- Canopy texture lines -->
  <path d="M100,72 Q138,56 178,76" fill="none" stroke="#3d7230" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M72,112 Q128,94 190,116" fill="none" stroke="#3d7230" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M58,154 Q122,138 198,158" fill="none" stroke="#3d7230" stroke-width="2"   stroke-linecap="round"/>
  <path d="M62,192 Q110,178 182,195" fill="none" stroke="#3d7230" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Window / door opening in canopy -->
  <rect x="116" y="155" width="48" height="38" rx="5" fill="#d0dca8" stroke="#1a1209" stroke-width="2.5"/>
  <rect x="116" y="155" width="48" height="38" rx="5" fill="none" stroke="#1a1209" stroke-width="2.5"/>
  <line x1="140" y1="155" x2="140" y2="193" stroke="#8aaa58" stroke-width="1.5"/>
  <line x1="116" y1="174" x2="164" y2="174" stroke="#8aaa58" stroke-width="1.5"/>

  <!-- Antenna / pipe on top -->
  <line x1="152" y1="24" x2="162" y2="6"  stroke="#778888" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="163" cy="5" rx="6" ry="5" fill="#99aaaa" stroke="#1a1209" stroke-width="2"/>

  <!-- Bridge connector stub right -->
  <rect x="218" y="200" width="62" height="12" rx="2" fill="#c4923a" stroke="#1a1209" stroke-width="2.5"/>
  <line x1="230" y1="200" x2="230" y2="212" stroke="#9a6e18" stroke-width="1.5"/>
  <line x1="248" y1="200" x2="248" y2="212" stroke="#9a6e18" stroke-width="1.5"/>
  <line x1="266" y1="200" x2="266" y2="212" stroke="#9a6e18" stroke-width="1.5"/>

  <!-- Bridge connector stub left -->
  <rect x="0" y="215" width="52" height="12" rx="2" fill="#c4923a" stroke="#1a1209" stroke-width="2.5"/>
  <line x1="14"  y1="215" x2="14"  y2="227" stroke="#9a6e18" stroke-width="1.5"/>
  <line x1="32"  y1="215" x2="32"  y2="227" stroke="#9a6e18" stroke-width="1.5"/>

  <!-- Hanging lanterns from canopy -->
  <line x1="80"  y1="186" x2="78"  y2="202" stroke="#7a5810" stroke-width="2"/>
  <rect x="70"   y="202"  width="17" height="23" rx="3" fill="#f0a030" stroke="#1a1209" stroke-width="2"/>
  <rect x="70"   y="202"  width="17" height="6"  rx="1" fill="#c4923a" stroke="#1a1209" stroke-width="1.5"/>
  <rect x="70"   y="219"  width="17" height="6"  rx="1" fill="#c4923a" stroke="#1a1209" stroke-width="1.5"/>

  <line x1="178" y1="180" x2="180" y2="198" stroke="#7a5810" stroke-width="2"/>
  <rect x="172"  y="198"  width="17" height="23" rx="3" fill="#f0a030" stroke="#1a1209" stroke-width="2"/>
  <rect x="172"  y="198"  width="17" height="6"  rx="1" fill="#c4923a" stroke="#1a1209" stroke-width="1.5"/>
  <rect x="172"  y="215"  width="17" height="6"  rx="1" fill="#c4923a" stroke="#1a1209" stroke-width="1.5"/>
</svg>
